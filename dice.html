<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>擲骰子遊戲</title>
  <style>
    body {
      font-family: "Noto Sans TC", sans-serif;
      background: linear-gradient(135deg, #1e3a8a, #2563eb);
      color: #f8fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      position: relative;
    }
    .container {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      width: min(420px, 90%);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      backdrop-filter: blur(12px);
    }
    h1 {
      margin: 0 0 18px;
      font-size: 2rem;
      letter-spacing: 1px;
    }
    .dice {
      font-size: 6rem;
      margin: 20px 0 10px;
      line-height: 1;
      transition: transform 0.1s ease;
    }
    .dice.rolling {
      animation: spin 0.1s linear;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .result {
      font-size: 1.25rem;
      margin: 0 0 20px;
      min-height: 1.5em;
    }
    button {
      background: #facc15;
      color: #1f2937;
      border: none;
      border-radius: 999px;
      padding: 14px 26px;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 12px 20px rgba(0, 0, 0, 0.18);
    }
    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 16px 24px rgba(0, 0, 0, 0.22);
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .history {
      margin-top: 24px;
      text-align: left;
      font-size: 0.95rem;
      background: rgba(255, 255, 255, 0.08);
      padding: 16px;
      border-radius: 16px;
      max-height: 180px;
      overflow-y: auto;
    }
    .history strong {
      display: block;
      margin-bottom: 10px;
      color: #f8fafc;
    }
    .history ul {
      padding-left: 20px;
      margin: 0;
    }
    .sound-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #f8fafc;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      cursor: pointer;
      font-size: 1.2rem;
      transition: background 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sound-toggle:hover {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <button class="sound-toggle" id="soundToggle" title="關閉/開啟音效">🔊</button>
  <div class="container">
    <h1>擲骰子遊戲</h1>
    <div class="dice" id="diceFace">🎲</div>
    <div class="result" id="resultText">按下按鈕開始擲骰子！</div>
    <button id="rollButton">擲骰子</button>
    <div class="history">
      <strong>擲骰子紀錄</strong>
      <ul id="historyList"></ul>
    </div>
  </div>
  <script>
    // 初始化音訊上下文
    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    let soundEnabled = true;
    
    const diceFace = document.getElementById('diceFace');
    const resultText = document.getElementById('resultText');
    const rollButton = document.getElementById('rollButton');
    const historyList = document.getElementById('historyList');
    const soundToggle = document.getElementById('soundToggle');

    // 播放搖骰子音效
    function playShakeSound() {
      if (!soundEnabled) return;
      const now = audioContext.currentTime;
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.setValueAtTime(200, now);
      oscillator.frequency.exponentialRampToValueAtTime(100, now + 0.1);
      
      gainNode.gain.setValueAtTime(0.3, now);
      gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      
      oscillator.start(now);
      oscillator.stop(now + 0.1);
    }

    // 播放結果音效 - 根據擲出的點數播放不同的音高
    function playResultSound(value) {
      if (!soundEnabled) return;
      const frequencies = [262, 294, 330, 349, 392, 440]; // C4 到 A4
      const frequency = frequencies[value - 1];
      
      const now = audioContext.currentTime;
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.setValueAtTime(frequency, now);
      gainNode.gain.setValueAtTime(0.2, now);
      gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
      
      oscillator.start(now);
      oscillator.stop(now + 0.3);
    }

    function rollDice() {
      rollButton.disabled = true;
      diceFace.classList.add('rolling');
      playShakeSound();
      
      // 播放搖骰子動畫
      let animationCount = 0;
      const diceIcons = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
      const animationInterval = setInterval(() => {
        diceFace.textContent = diceIcons[Math.floor(Math.random() * 6)];
        animationCount++;
        if (animationCount > 18) {
          clearInterval(animationInterval);
          const value = Math.floor(Math.random() * 6) + 1;
          diceFace.textContent = diceIcons[value - 1];
          diceFace.classList.remove('rolling');
          resultText.textContent = `你擲出了 ${value} 點！`;
          playResultSound(value);

          const entry = document.createElement('li');
          const timestamp = new Date().toLocaleTimeString();
          entry.textContent = `${timestamp} - ${value} 點`;
          historyList.prepend(entry);

          if (historyList.children.length > 6) {
            historyList.removeChild(historyList.lastChild);
          }
          
          rollButton.disabled = false;
        }
      }, 80);
    }

    // 音效開關控制
    soundToggle.addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      soundToggle.textContent = soundEnabled ? '🔊' : '🔇';
    });

    rollButton.addEventListener('click', rollDice);
  </script>
</body>
</html>
